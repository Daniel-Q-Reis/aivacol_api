services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: aivacol-app
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-3000}
      DB_HOST: ${DB_HOST:-sqlserver}
      DB_PORT: ${DB_PORT:-1433}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/aivacol_audit}
      BENCHMARK_BASE_URL: ${BENCHMARK_BASE_URL:-http://app:3000}
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app
      - app-node-modules:/usr/src/app/node_modules
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', 'scripts/container-healthcheck.js']
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    networks:
      - aivacol-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aivacol-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_PID: 'Developer'
      SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -C -Q "SELECT 1" >/dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 35s
    restart: unless-stopped
    networks:
      - aivacol-network

  redis:
    image: redis:7-alpine
    container_name: aivacol-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - aivacol-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aivacol-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - aivacol-network

  mongodb:
    image: mongo:7
    container_name: aivacol-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - aivacol-network

  benchmark-runner:
    image: node:18-alpine
    container_name: aivacol-benchmark-runner
    profiles:
      - tools
    working_dir: /usr/src/app
    env_file:
      - .env
    environment:
      BENCHMARK_BASE_URL: ${BENCHMARK_BASE_URL:-http://app:3000}
    volumes:
      - .:/usr/src/app
    depends_on:
      app:
        condition: service_healthy
    command: ['tail', '-f', '/dev/null']
    networks:
      - aivacol-network

networks:
  aivacol-network:
    name: aivacol-network
    driver: bridge

volumes:
  app-node-modules:
    name: aivacol-app-node-modules
  sqlserver-data:
    name: aivacol-sqlserver-data
  redis-data:
    name: aivacol-redis-data
  rabbitmq-data:
    name: aivacol-rabbitmq-data
  mongodb-data:
    name: aivacol-mongodb-data
